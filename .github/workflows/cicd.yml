name: CICD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY_OWNER: ticketrushplatform
  IMAGE_NAME: ticketrush-event_api

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Install dependencies 
        run: |
          go mod download
      - name: Run Go unit test
        run: |
          go test $(go list ./... | grep -v "/docs\|/cmd\|/redisqueue\|/infrastructure/database\|observability") -coverprofile=coverage.out

      - name: Install bc 
        run: |
          sudo apt-get update && sudo apt-get install -y bc

      - name: Coverage gate
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep "total" | awk '{print substr($3, 1, length($3)-1)}' | tail -n 1)

          echo "Coverage: $COVERAGE%"
  
          THRESHOLD=90
          RESULT=$(echo "$COVERAGE < $THRESHOLD" | bc)

          if [ "$RESULT" -eq 1 ]; then
            echo "Coverage < $THRESHOLD"
            exit 1
          fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: unit-test
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Generate image tag
        id: meta
        run: |
          IMAGE=ghcr.io/${{ env.REGISTRY_OWNER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

          echo "Using image: $IMAGE"

      - name: Build image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.image }} \
            .

      - name: Push image
        run: |
          docker push ${{ steps.meta.outputs.image }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            IMAGE=${{ needs.build-and-push.outputs.image }}

            echo "Deploying $IMAGE"

            docker login ghcr.io \
              -u ${{ github.actor }} \
              -p ${{ secrets.GHCR_PAT }}

            cd ${{ secrets.DEPLOY_PATH }}

            export EVENT_API_TAG=${{ github.sha }}

            docker pull $IMAGE

            docker compose up -d --no-deps event_api
