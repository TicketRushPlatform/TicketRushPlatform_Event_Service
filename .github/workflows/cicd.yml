name: CICD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Install dependencies 
        run: |
          go mod download
      - name: Run Go unit test
        run: |
          go test ./... -coverprofile=coverage.out

      - name: Install bc 
        run: |
          sudo apt-get update && sudo apt-get install -y bc

      - name: Coverage gate
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep "total" | awk '{print substr($3, 1, length($3)-1)}' | tail -n 1)

          echo "Coverage: $COVERAGE%"
  
          THRESHOLD=90
          RESULT=$(echo "$COVERAGE < $THRESHOLD" | bc)

          if [ "$RESULT" -eq 1 ]; then
            echo "Coverage < $THRESHOLD"
            exit 1
          fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: unit-test

    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        id: build
        run: |
          IMAGE=${{ secrets.DOCKER_REGISTRY }}/${{ secrets.REGISTRY_PROJECT }}/ticketrush-event-api:latest

          echo "image=$IMAGE" >> $GITHUB_OUTPUT

          docker build -t $IMAGE .
          docker push $IMAGE

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKER_REGISTRY }}/${{ secrets.REGISTRY_PROJECT }}/ticketrus-event-api:latest

            echo "Deploying $IMAGE"

            cd ${{ secrets.DEPLOY_PATH }}

            docker pull $IMAGE

            docker compose up -d event_api
